server:
  port: 12117

spring:
  application:
    name: local-ai-crawler
  threads:
    virtual:
      enabled: true        # JDK21 虚拟线程，提升 IO 密集型爬虫吞吐量

  # ===== PostgreSQL 数据源（持久化每日热榜数据） =====
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://101.132.182.160:5432/ai_knowledge
    username: jianbo
    password: 525826

  # ===== 启动时自动执行建表 SQL =====
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# ==================== 爬虫业务配置 ====================
crawler:
  # local-ai-knowledge 知识库服务（数据最终推送目标，爬虫专用接口无需认证）
  knowledge-api:
    base-url: http://localhost:12116

  # BloomFilter 布隆过滤器（内存去重）
  bloom-filter:
    expected-insertions: 1000000   # 预计最大条目数
    fpp: 0.001                     # 误判率 0.1%

  # Playwright 无头浏览器配置
  playwright:
    headless: true
    timeout: 30000                 # 页面加载超时（毫秒）

  # 各爬虫 @Scheduled Cron 表达式
  schedule:
    github-trending: "0 0 */2 * * ?"     # 每2小时
    weibo-hot:       "0 */30 * * * ?"    # 每30分钟
    zhihu-hot:       "0 */30 * * * ?"    # 每30分钟
    bilibili-hot:    "0 0 */3 * * ?"     # 每3小时
    xiaohongshu:     "0 0 */4 * * ?"     # 每4小时
    douyin:          "0 0 */4 * * ?"     # 每4小时

# ==================== XXL-JOB 分布式调度（可选） ====================
xxl:
  job:
    enabled: false                 # 默认关闭，需要分布式调度时开启
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: local-ai-crawler
      address:
      ip:
      port: 9999
      logpath: ./logs/xxl-job
      logretentiondays: 30
    accessToken: default_token

# ==================== 日志 ====================
logging:
  level:
    com.jianbo.crawler: DEBUG
    com.microsoft.playwright: WARN
