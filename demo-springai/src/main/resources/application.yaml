spring:
  application:
    name: demo-springai
  ai:
    minimax:
      api-key: ${MINIMAX_API_KEY:sk-cp-vBXrVb07yCb61nNn73fmjHvvNI_VIEyH-_WVwSmSNdFDX_EkZjfvt15XJwqVndDWJEZzxqCuy6PjzgNWdd3_4EPvGuSE_cD1yXki9zzHsoGybOUqYM8d5Jg}
      chat:
        options:
          model: MiniMax-M2.7
          temperature: 0.3
          max-tokens: 2048
      embedding:
        options:
          model: MiniMax-M2.7
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-56e2020c1c9b41c6ad75016667f65877}
      chat:
        options:
          model: DeepSeek-V4-Flash
          temperature: 0.3
          max-tokens: 2048
    vectorstore:
      pgvector:
        index-type: hnsw              # 索引类型：HNSW（推荐）或 IVFFlat
        distance-type: COSINE_DISTANCE # 距离算法：余弦相似度
        dimensions: 1536              # 向量维度（必须与模型一致）
        initialize-schema: false      # M5版本需要手动初始化，改为false
        schema-name: public
        table-name: vector_store
          # 向量索引配置
        hnsw:
          m: 16                        # 每个节点的最大连接数
          ef-construction: 200        # 构建时的动态列表大小
          # 检索配置
        similarity-threshold: 0.7     # 默认相似度阈值
        top-k: 5
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true
  data:
    redis:
      host: localhost
      port: 6379
      password: spjiyou
      timeout: 1000
      lettuce:
        pool:
          max-active: 100
          max-idle: 100
          min-idle: 10
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/vector_db
    username: myuser
    password: 525826
server:
  port: 12115
# 日志配置（调试用）
logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.jdbc: DEBUG