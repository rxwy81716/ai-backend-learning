server:
  port: 12116
spring:
  datasource:
    url: jdbc:postgresql://101.132.182.160:5432/ai_knowledge
    username: jianbo
    password: 123456
    driver-class-name: org.postgresql.Driver
  #  profiles:
  #    active: local
  application:
    name: local-ai-knowledge
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5
          temperature: 0.3
          num-predict: 2048
      embedding:
        options:
          model: bge-m3
    vectorstore:
      elasticsearch:
        index-name: knowledge_vector_store
        dimensions: 1024   # bge-m3的维度
        similarity: cosine
    elasticsearch:
      uris: http://localhost:9200
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true
logging:
  level:
    org.springframework.ai: DEBUG
