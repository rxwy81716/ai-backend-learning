server:
  port: 12116
spring:
  profiles:
    # 默认走 glm（智谱 glm-4-flash，永久免费）；切 DeepSeek 用 -Dspring.profiles.active=deepseek
    active: ${SPRING_PROFILES_ACTIVE:deepseek}
  application:
    name: local-ai-knowledge
  ai:
    # 引入 spring-ai-starter-model-openai 后，它的 audio/image/moderation 子自动配置会强制要求
    # spring.ai.openai.api-key，没设就启动失败。本项目只用 OpenAI 兼容协议跑 embedding（硅基流动），
    # 其余 OpenAI 子模块全部关掉。chat / embedding 走各 profile 显式配置。
    model:
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    vectorstore:
      pgvector:
        index-type: hnsw              # 索引类型：HNSW（推荐）或 IVFFlat
        distance-type: COSINE_DISTANCE # 距离算法：余弦相似度
        dimensions: 1024              # 向量维度（必须与模型一致）
        initialize-schema: true       # 自动创建 vector_store 表
        schema-name: public
        table-name: vector_store
        # 向量索引配置
        hnsw:
          m: 16                        # 每个节点的最大连接数
          ef-construction: 200        # 构建时的动态列表大小
          # 检索配置
        similarity-threshold: 0.7     # 默认相似度阈值
        top-k: 5
      elasticsearch:
        index-name: knowledge_vector_store
        dimensions: 1024
        similarity: cosine
  # chat 配置按 profile 拆分：application-glm.yml / application-deepseek.yml
  # embedding 始终由 EmbeddingModelConfig 的 @Primary bean 接管（读取下方 app.embedding.* 配置）
  elasticsearch:
    uris: http://localhost:9200  # ES 地址
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
    encoding:
      charset: utf-8
      enabled: true
      force: true
  data:
    redis:
      host: localhost
      port: 6379
  # ==================== 数据库 ====================
  datasource:
    url: jdbc:postgresql://101.132.182.160:5432/ai_knowledge?tcpKeepAlive=true
    username: jianbo
    password: 525826
    driver-class-name: org.postgresql.Driver
    hikari:
      # 公网 PG：中间网络/PG 自身可能在 5~10min 内回收 idle，HikariCP 默认 30min
      # 容易拿到死连接报 "This connection has been closed."。把生命周期压短到 5min，
      # 比中间链路更早主动关掉，可避免上述告警。
      max-lifetime: 300000          # 5 分钟（必须 < PG/网关 idle 超时）
      idle-timeout: 180000          # 3 分钟空闲即归还
      keepalive-time: 120000        # 2 分钟做一次 connectionTestQuery，链路探活
      connection-test-query: SELECT 1
      minimum-idle: 2
      maximum-pool-size: 10
app:
  upload:
    dir: ./uploads
  crawler:
    base-url: http://localhost:12117
  web-search:
    enabled: false                    # 启用网络搜索降级（需配置 api-key）
    api-key: ${TAVILY_API_KEY:}      # Tavily API Key（环境变量或直接填）
    max-results: 3
  jwt:
    secret: local-dev-jwt-secret-key-at-least-32-chars-do-not-use-in-prod-2026
    expiration-hours: 24
  crawler-api-key: local-dev-crawler-api-key-2026
  rate-limit:
    anonymous-max: 20                 # 匿名用户每窗口最大请求数
    window-minutes: 60                # 限流窗口（分钟）
    # 已认证用户的 chat 接口限流（仅作用于 /api/rag/chat 与 /api/rag/chat/stream）
    chat:
      user-qps: 2                     # 单用户每秒最大请求数
      user-daily: 200                 # 单用户每天最大请求数
      ip-qps: 5                       # 单 IP 每秒最大请求数（同 IP 多账号防刷）
  rag:
    # 混合检索：向量召回 + BM25 关键词召回 + RRF 融合
    hybrid:
      enabled: true                   # 关闭后退化为纯向量检索
      vector-top-k: 30                # 向量召回数（融合前）
      keyword-top-k: 30               # BM25 召回数（融合前）
      rrf-k: 60                       # RRF 平滑常数（论文推荐 60）
      parallel-timeout-ms: 3000       # 双路并发超时
      similarity-threshold: 0.25      # 向量召回最低相似度
  # Embedding 始终走硅基流动 bge-m3（1024 维，OpenAI 兼容协议）
  embedding:
    siliconflow:
      base-url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:sk-ujhxtozyxlazxylbthdtfcgbqgsezzkjcufglnvzzwwruktv}
      model: BAAI/bge-m3
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#    打印sql
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  # 自定义 logback 配置位置（放在 resources/logs/ 下，需显式指定）
  config: classpath:logs/logback-spring.xml
  file:
    # 日志输出目录，支持通过环境变量 LOG_PATH 覆盖；具体滚动策略见 logs/logback-spring.xml
    path: ${LOG_PATH:./logs}
  level:
    org.springframework.ai: INFO

