server:
  port: 12116
spring:
  profiles:
    active: com
  application:
    name: local-ai-knowledge
  ai:
    vectorstore:
#      elasticsearch:
#        index-name: knowledge_vector_store
#        dimensions: 1024   # bge-m3的维度
#        similarity: cosine
      pgvector:
        index-type: hnsw              # 索引类型：HNSW（推荐）或 IVFFlat
        distance-type: COSINE_DISTANCE # 距离算法：余弦相似度
        dimensions: 1536              # 向量维度（必须与模型一致）
        initialize-schema: true       # 自动创建 vector_store 表
        schema-name: public
        table-name: vector_store
        # 向量索引配置
        hnsw:
          m: 16                        # 每个节点的最大连接数
          ef-construction: 200        # 构建时的动态列表大小
          # 检索配置
        similarity-threshold: 0.7     # 默认相似度阈值
        top-k: 5
      elasticsearch:
        index-name: knowledge_vector_store
        dimensions: 1536
        similarity: cosine
    elasticsearch:
      uris: http://localhost:9200  # ES 地址
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
    encoding:
      charset: utf-8
      enabled: true
      force: true
  data:
    redis:
      host: localhost
      port: 6379
app:
  upload:
    dir: ./uploads
  crawler:
    base-url: http://localhost:12117
  web-search:
    enabled: false                    # 启用网络搜索降级（需配置 api-key）
    api-key: ${TAVILY_API_KEY:}      # Tavily API Key（环境变量或直接填）
    max-results: 3
  jwt:
    # 生产环境必须通过环境变量 JWT_SECRET 配置，未配置则启动失败
    secret: ${JWT_SECRET:}
    expiration-hours: 24              # Token 有效期（小时）
  # 爬虫 API Key（用于 crawler-upload 接口认证）
  crawler-api-key: ${CRAWLER_API_KEY:}
  rate-limit:
    anonymous-max: 20                 # 匿名用户每窗口最大请求数
    window-minutes: 60                # 限流窗口（分钟）
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  level:
    org.springframework.ai: INFO
